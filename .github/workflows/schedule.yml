name: Weekly Strava ETL Sync

on:
  schedule:
    # Runs at 00:00 UTC every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Important: Allows the bot to save the SQLite DB back to this repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pandas

      - name: Run Extraction & Transform
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python src/extract.py
          python src/transform.py

      - name: Commit Database Back to ETL Repo
        # We still want to save the SQLite database to THIS repo so you have historical data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/strava.db data/metrics.json
          git commit -m "Automated Sync: Update local database and metrics" || echo "No changes to commit"
          git push

      - name: Push metrics.json to Portfolio Repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          # This secret must be set in your ETL repo settings
          API_TOKEN_GITHUB: ${{ secrets.PORTFOLIO_REPO_TOKEN }}
        with:
          source_file: 'data/metrics.json'
          destination_repo: 'sardaaryan/portfolio' # 👈 Replace with your actual username/repo
          destination_folder: 'data'
          user_email: 'github-actions@github.com'
          user_name: 'strava-etl-bot'
          commit_message: 'chore: Update weekly Strava metrics from ETL pipeline'
          destination_branch: 'main'